{{define "partials/ca_builder_columns.html"}}
<input type="hidden" name="schema" value="{{.Schema}}">
<input type="hidden" name="table" value="{{.Table}}">

<!-- Step 2: Time Column & Bucket -->
<div class="rounded-lg border border-gray-200 bg-white p-5 dark:border-gray-700 dark:bg-gray-800">
    <div class="flex items-center gap-2 mb-4">
        <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-orange-600 text-white text-xs font-bold">2</span>
        <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wide dark:text-gray-100">Time Column & Bucket Interval</h2>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Time Column</label>
            <select name="time_column" required
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
                {{range .Columns}}
                <option value="{{.Name}}">{{.Name}} ({{.Type}})</option>
                {{end}}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Bucket Interval</label>
            <div class="mt-1 flex flex-wrap gap-1">
                <button type="button" onclick="document.querySelector('[name=bucket]').value='1 minute'" class="rounded border border-gray-300 bg-gray-50 px-2 py-0.5 text-xs text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">1m</button>
                <button type="button" onclick="document.querySelector('[name=bucket]').value='5 minutes'" class="rounded border border-gray-300 bg-gray-50 px-2 py-0.5 text-xs text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">5m</button>
                <button type="button" onclick="document.querySelector('[name=bucket]').value='1 hour'" class="rounded border border-gray-300 bg-gray-50 px-2 py-0.5 text-xs text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">1h</button>
                <button type="button" onclick="document.querySelector('[name=bucket]').value='1 day'" class="rounded border border-gray-300 bg-gray-50 px-2 py-0.5 text-xs text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">1d</button>
                <button type="button" onclick="document.querySelector('[name=bucket]').value='1 week'" class="rounded border border-gray-300 bg-gray-50 px-2 py-0.5 text-xs text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">1w</button>
                <button type="button" onclick="document.querySelector('[name=bucket]').value='1 month'" class="rounded border border-gray-300 bg-gray-50 px-2 py-0.5 text-xs text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">1mo</button>
            </div>
            <input type="text" name="bucket" value="1 hour" required
                   class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
        </div>
    </div>
</div>

<!-- Step 3: Aggregate Columns -->
<div class="rounded-lg border border-gray-200 bg-white p-5 dark:border-gray-700 dark:bg-gray-800">
    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
            <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-orange-600 text-white text-xs font-bold">3</span>
            <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wide dark:text-gray-100">Aggregate Columns</h2>
        </div>
        <button type="button" onclick="addAggRow()" class="inline-flex items-center rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-600">
            <svg class="mr-1 h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            Add Column
        </button>
    </div>
    <div id="agg-rows" class="space-y-2">
        <div class="agg-row flex items-center gap-2">
            <select name="agg_col[]" class="flex-1 rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
                {{range .Columns}}
                <option value="{{.Name}}">{{.Name}}</option>
                {{end}}
            </select>
            <select name="agg_func[]" class="w-28 rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
                <option value="avg">avg</option>
                <option value="sum">sum</option>
                <option value="min">min</option>
                <option value="max">max</option>
                <option value="count">count</option>
                <option value="last">last</option>
                <option value="first">first</option>
            </select>
            <input type="text" name="agg_alias[]" placeholder="alias" required
                   class="w-36 rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
            <button type="button" onclick="this.closest('.agg-row').remove()" class="text-red-400 hover:text-red-600 dark:hover:text-red-300">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
    </div>
</div>

<!-- Preview Button -->
<div class="flex justify-end">
    <button type="button"
            hx-post="/continuous-aggregates/builder/preview"
            hx-target="#preview-section"
            hx-swap="innerHTML"
            hx-include="[name='schema'],[name='table'],[name='time_column'],[name='bucket'],[name='agg_col[]'],[name='agg_func[]'],[name='agg_alias[]'],[name='gorilla.csrf.Token']"
            class="inline-flex items-center rounded-lg bg-orange-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-orange-500 transition-colors">
        <svg class="mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Preview SQL
    </button>
</div>

<div id="preview-section"></div>

<script>
function addAggRow() {
    var container = document.getElementById('agg-rows');
    var first = container.querySelector('.agg-row');
    if (!first) return;
    var clone = first.cloneNode(true);
    clone.querySelector('[name="agg_alias[]"]').value = '';
    container.appendChild(clone);
}
</script>
{{end}}
