{{define "partials/ca_builder_preview.html"}}
{{if .Error}}
<div class="rounded-lg border border-red-200 bg-red-50 p-4 dark:border-red-800 dark:bg-red-900/30">
    <p class="text-sm font-medium text-red-800 dark:text-red-400">Error generating query</p>
    <pre class="mt-1 text-sm text-red-700 dark:text-red-300 whitespace-pre-wrap font-mono">{{.Error}}</pre>
</div>
{{else}}
<!-- Step 4: Preview & Create -->
<div class="rounded-lg border border-gray-200 bg-white p-5 dark:border-gray-700 dark:bg-gray-800">
    <div class="flex items-center gap-2 mb-4">
        <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-orange-600 text-white text-xs font-bold">4</span>
        <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wide dark:text-gray-100">Preview & Create</h2>
    </div>

    <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Generated SQL</label>
        <textarea id="ca-query-textarea" name="query" rows="8"
                  class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border font-mono dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100"
                  spellcheck="false">{{.Query}}</textarea>
    </div>

    <div class="mt-3 flex items-center gap-2">
        <button type="button"
                hx-post="/continuous-aggregates/builder/explain"
                hx-target="#explain-output"
                hx-swap="innerHTML"
                hx-include="#ca-query-textarea,[name='gorilla.csrf.Token']"
                class="inline-flex items-center rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-600">
            <svg class="mr-1.5 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
            Explain Analyze
        </button>
    </div>

    <div id="explain-output" class="mt-3"></div>

    <form method="POST" action="/continuous-aggregates/create" class="mt-5 pt-5 border-t border-gray-200 dark:border-gray-700 space-y-4">
        <input type="hidden" name="gorilla.csrf.Token" value="" id="ca-csrf-token">
        <script>
        (function() {
            var token = document.querySelector('[name="gorilla.csrf.Token"]');
            if (token) document.getElementById('ca-csrf-token').value = token.value;
        })();
        </script>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">View Name</label>
                <input type="text" name="name" required placeholder="my_hourly_agg"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400">
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="preview-materialized-only" name="materialized_only"
                       class="rounded border-gray-300 text-orange-600 focus:ring-orange-500 dark:bg-gray-700 dark:border-gray-600">
                <label for="preview-materialized-only" class="text-sm text-gray-700 dark:text-gray-300">Materialized only</label>
            </div>
        </div>
        <input type="hidden" name="query" id="ca-create-query" value="">
        <script>
        (function() {
            var textarea = document.getElementById('ca-query-textarea');
            var hidden = document.getElementById('ca-create-query');
            if (textarea && hidden) {
                hidden.value = textarea.value;
                textarea.addEventListener('input', function() { hidden.value = textarea.value; });
            }
        })();
        </script>
        <div class="flex gap-3">
            <button type="submit" class="rounded-lg bg-orange-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-orange-500 transition-colors">Create Continuous Aggregate</button>
            <a href="/continuous-aggregates" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 shadow-sm hover:bg-gray-50 transition-colors dark:bg-gray-700 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-600">Cancel</a>
        </div>
    </form>
</div>
{{end}}
{{end}}
