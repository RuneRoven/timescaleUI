{{define "partials/alert.html"}}
<div class="mb-4 rounded-lg border px-4 py-3 text-sm
    {{if eq .Type "success"}}border-emerald-200 bg-emerald-50 text-emerald-800{{end}}
    {{if eq .Type "error"}}border-red-200 bg-red-50 text-red-800{{end}}
    {{if eq .Type "info"}}border-blue-200 bg-blue-50 text-blue-800{{end}}
    {{if eq .Type "warning"}}border-amber-200 bg-amber-50 text-amber-800{{end}}
">{{.Message}}</div>
{{end}}
