{{define "stat-card"}}
<div class="overflow-hidden rounded-lg border border-gray-200 bg-white px-4 py-5 dark:border-gray-700 dark:bg-gray-800">
    <div class="flex items-center">
        <div class="flex-shrink-0">
            {{if eq .icon "warning"}}<svg class="h-8 w-8 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
            {{else}}<svg class="h-8 w-8 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6z"/></svg>{{end}}
        </div>
        <div class="ml-4">
            <p class="text-sm font-medium text-gray-500 dark:text-gray-400">{{.label}}</p>
            <p class="mt-1 text-2xl font-semibold text-gray-900 dark:text-gray-100">{{.value}}</p>
        </div>
    </div>
</div>
{{end}}
