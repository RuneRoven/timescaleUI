{{define "pages/settings.html"}}
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900">Settings</h1>
    <p class="mt-1 text-sm text-gray-500">Manage your admin account and database connection</p>

    <div id="settings-alerts"></div>

    <!-- Change Password -->
    <div class="mt-6 rounded-lg border border-gray-200 bg-white p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Change Password</h2>
        <form hx-post="/settings/password" hx-target="#settings-alerts" hx-swap="innerHTML" class="space-y-4">
            <input type="hidden" name="gorilla.csrf.Token" value="{{.CSRFToken}}">
            <div>
                <label class="block text-sm font-medium text-gray-700">Current Password</label>
                <input type="password" name="current_password" required autocomplete="current-password"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">New Password</label>
                <input type="password" name="new_password" required minlength="8" autocomplete="new-password"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Confirm New Password</label>
                <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
            </div>
            <button type="submit" class="rounded-lg bg-orange-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-orange-500 transition-colors">Update Password</button>
        </form>
    </div>

    <!-- Database Connection -->
    <div class="mt-6 rounded-lg border border-gray-200 bg-white p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Database Connection</h2>
        <form hx-post="/settings/database" hx-target="#settings-alerts" hx-swap="innerHTML" class="space-y-4">
            <input type="hidden" name="gorilla.csrf.Token" value="{{.CSRFToken}}">
            <div class="grid grid-cols-3 gap-4">
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Host</label>
                    <input type="text" name="db_host" value="{{.DBHost}}" required
                           class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Port</label>
                    <input type="number" name="db_port" value="{{.DBPort}}" required
                           class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="db_user" value="{{.DBUser}}" required
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="db_password" placeholder="Leave blank to keep current" autocomplete="off"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Database</label>
                <input type="text" name="db_name" value="{{.DBName}}" required
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">SSL Mode</label>
                <select name="db_sslmode"
                        class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                    <option value="prefer" {{if eq .DBSSLMode "prefer"}}selected{{end}}>prefer</option>
                    <option value="disable" {{if eq .DBSSLMode "disable"}}selected{{end}}>disable</option>
                    <option value="require" {{if eq .DBSSLMode "require"}}selected{{end}}>require</option>
                    <option value="verify-ca" {{if eq .DBSSLMode "verify-ca"}}selected{{end}}>verify-ca</option>
                    <option value="verify-full" {{if eq .DBSSLMode "verify-full"}}selected{{end}}>verify-full</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Current Admin Password (required to confirm changes)</label>
                <input type="password" name="current_password" required autocomplete="current-password"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
            </div>
            <button type="submit" class="rounded-lg bg-orange-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-orange-500 transition-colors">Update Connection</button>
        </form>
    </div>
</div>
{{end}}
