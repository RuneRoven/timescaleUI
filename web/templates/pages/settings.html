{{define "pages/settings.html"}}
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Settings</h1>
    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Manage your admin account and database connection</p>

    <div id="settings-alerts"></div>

    <!-- Theme -->
    <div class="mt-6 rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-700 dark:bg-gray-800">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 dark:text-gray-100">Theme</h2>
        <div class="flex gap-3">
            <button onclick="setTheme('auto')" data-theme-option="auto"
                    class="flex-1 rounded-lg border-2 p-3 text-center text-sm transition-colors border-gray-200 dark:border-gray-600">
                <div class="font-medium text-gray-900 dark:text-gray-100">Auto</div>
                <div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Follow system</div>
            </button>
            <button onclick="setTheme('light')" data-theme-option="light"
                    class="flex-1 rounded-lg border-2 p-3 text-center text-sm transition-colors border-gray-200 dark:border-gray-600">
                <div class="font-medium text-gray-900 dark:text-gray-100">Light</div>
                <div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Always light</div>
            </button>
            <button onclick="setTheme('dark')" data-theme-option="dark"
                    class="flex-1 rounded-lg border-2 p-3 text-center text-sm transition-colors border-gray-200 dark:border-gray-600">
                <div class="font-medium text-gray-900 dark:text-gray-100">Dark</div>
                <div class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Always dark</div>
            </button>
        </div>
        <script>
        (function() {
            var cur = localStorage.getItem('theme') || 'auto';
            document.querySelectorAll('[data-theme-option]').forEach(function(el) {
                var isActive = el.getAttribute('data-theme-option') === cur;
                if (isActive) {
                    el.classList.add('border-orange-500', 'bg-orange-50', 'dark:bg-orange-900/30');
                    el.classList.remove('border-gray-200', 'dark:border-gray-600');
                }
            });
        })();
        </script>
    </div>

    <!-- Change Password -->
    <div class="mt-6 rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-700 dark:bg-gray-800">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 dark:text-gray-100">Change Password</h2>
        <form hx-post="/settings/password" hx-target="#settings-alerts" hx-swap="innerHTML" class="space-y-4">
            <input type="hidden" name="gorilla.csrf.Token" value="{{.CSRFToken}}">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Current Password</label>
                <input type="password" name="current_password" required autocomplete="current-password"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">New Password</label>
                <input type="password" name="new_password" required minlength="8" autocomplete="new-password"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Confirm New Password</label>
                <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
            </div>
            <button type="submit" class="rounded-lg bg-orange-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-orange-500 transition-colors">Update Password</button>
        </form>
    </div>

    <!-- Database Connection -->
    <div class="mt-6 rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-700 dark:bg-gray-800">
        <h2 class="text-lg font-semibold text-gray-900 mb-4 dark:text-gray-100">Database Connection</h2>
        <form hx-post="/settings/database" hx-target="#settings-alerts" hx-swap="innerHTML" class="space-y-4">
            <input type="hidden" name="gorilla.csrf.Token" value="{{.CSRFToken}}">
            <div class="grid grid-cols-3 gap-4">
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Host</label>
                    <input type="text" name="db_host" value="{{.Content.DBHost}}" required
                           class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Port</label>
                    <input type="number" name="db_port" value="{{.Content.DBPort}}" required
                           class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Username</label>
                <input type="text" name="db_user" value="{{.Content.DBUser}}" required
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                <input type="password" name="db_password" placeholder="Leave blank to keep current" autocomplete="off"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Database</label>
                <input type="text" name="db_name" value="{{.Content.DBName}}" required
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">SSL Mode</label>
                <select name="db_sslmode"
                        class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
                    <option value="prefer" {{if eq .Content.DBSSLMode "prefer"}}selected{{end}}>prefer</option>
                    <option value="disable" {{if eq .Content.DBSSLMode "disable"}}selected{{end}}>disable</option>
                    <option value="require" {{if eq .Content.DBSSLMode "require"}}selected{{end}}>require</option>
                    <option value="verify-ca" {{if eq .Content.DBSSLMode "verify-ca"}}selected{{end}}>verify-ca</option>
                    <option value="verify-full" {{if eq .Content.DBSSLMode "verify-full"}}selected{{end}}>verify-full</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Current Admin Password (required to confirm changes)</label>
                <input type="password" name="current_password" required autocomplete="current-password"
                       class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
            </div>
            <button type="submit" class="rounded-lg bg-orange-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-orange-500 transition-colors">Update Connection</button>
        </form>
    </div>
</div>
{{end}}
