{{define "pages/setup.html"}}
<div class="w-full max-w-lg">
    <div class="text-center mb-8">
        <svg class="mx-auto h-12 w-12 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7c-2 0-3 1-3 3z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h8M8 8h8M8 16h5"/>
        </svg>
        <h1 class="mt-4 text-2xl font-bold text-gray-900">Welcome to TimescaleUI</h1>
        <p class="mt-2 text-sm text-gray-600">Set up your admin account and database connection to get started.</p>
    </div>
    <div class="bg-white shadow-sm ring-1 ring-gray-900/5 rounded-xl p-6">
        <form method="POST" action="/setup" class="space-y-6">
            <input type="hidden" name="gorilla.csrf.Token" value="{{.CSRFToken}}">
            <fieldset>
                <legend class="text-sm font-semibold text-gray-900 border-b border-gray-200 pb-2 w-full">Admin Account</legend>
                <div class="mt-4 space-y-4">
                    <div>
                        <label for="admin_user" class="block text-sm font-medium text-gray-700">Username</label>
                        <input type="text" id="admin_user" name="admin_user" required autocomplete="username"
                               class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                    </div>
                    <div>
                        <label for="admin_password" class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" id="admin_password" name="admin_password" required minlength="8" autocomplete="new-password"
                               class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                        <p class="mt-1 text-xs text-gray-500">Minimum 8 characters</p>
                    </div>
                    <div>
                        <label for="admin_password_confirm" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                        <input type="password" id="admin_password_confirm" name="admin_password_confirm" required minlength="8" autocomplete="new-password"
                               class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                    </div>
                </div>
            </fieldset>
            <fieldset>
                <legend class="text-sm font-semibold text-gray-900 border-b border-gray-200 pb-2 w-full">Database Connection</legend>
                <div class="mt-4 space-y-4">
                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-2">
                            <label for="db_host" class="block text-sm font-medium text-gray-700">Host</label>
                            <input type="text" id="db_host" name="db_host" value="timescaledb" required
                                   class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                        </div>
                        <div>
                            <label for="db_port" class="block text-sm font-medium text-gray-700">Port</label>
                            <input type="number" id="db_port" name="db_port" value="5432" required
                                   class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                        </div>
                    </div>
                    <div>
                        <label for="db_user" class="block text-sm font-medium text-gray-700">Username</label>
                        <input type="text" id="db_user" name="db_user" value="postgres" required
                               class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                    </div>
                    <div>
                        <label for="db_password" class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" id="db_password" name="db_password" required autocomplete="off"
                               class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                    </div>
                    <div>
                        <label for="db_name" class="block text-sm font-medium text-gray-700">Database</label>
                        <input type="text" id="db_name" name="db_name" value="postgres" required
                               class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                    </div>
                    <div>
                        <label for="db_sslmode" class="block text-sm font-medium text-gray-700">SSL Mode</label>
                        <select id="db_sslmode" name="db_sslmode"
                                class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border">
                            <option value="prefer">prefer</option>
                            <option value="disable">disable</option>
                            <option value="require">require</option>
                            <option value="verify-ca">verify-ca</option>
                            <option value="verify-full">verify-full</option>
                        </select>
                    </div>
                </div>
            </fieldset>
            <button type="submit"
                    class="w-full flex justify-center rounded-lg bg-orange-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-orange-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-orange-600 transition-colors">
                Complete Setup
            </button>
        </form>
    </div>
</div>
{{end}}
