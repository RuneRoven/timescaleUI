{{define "pages/hypertable_create.html"}}
<div class="max-w-2xl">
    <div class="flex items-center gap-3 mb-6">
        <a href="/hypertables" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
        </a>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Create Hypertable</h1>
    </div>

    <div class="rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-700 dark:bg-gray-800">
        <form method="POST" action="/hypertables/create" class="space-y-5">
            <input type="hidden" name="gorilla.csrf.Token" value="{{.CSRFToken}}">
            <div>
                <label for="table_select" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Table</label>
                <select id="table_select" name="table_full" required
                        class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100"
                        hx-get="/hypertables/columns" hx-target="#column_select" hx-swap="innerHTML"
                        hx-include="[name='table_full']"
                        onchange="var parts = this.value.split('.'); document.getElementById('schema_input').value = parts[0]; document.getElementById('table_input').value = parts[1];">
                    <option value="">Select a table...</option>
                    {{range .Content.Tables}}
                    <option value="{{.Schema}}.{{.Name}}">{{.Schema}}.{{.Name}}</option>
                    {{end}}
                </select>
                <input type="hidden" id="schema_input" name="schema">
                <input type="hidden" id="table_input" name="table">
            </div>
            <div>
                <label for="time_column" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Time Column</label>
                <select id="column_select" name="time_column" required
                        class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
                    <option value="">Select a table first...</option>
                </select>
            </div>
            <div>
                <label for="chunk_interval" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Chunk Interval</label>
                <div class="mt-1 flex flex-wrap gap-2">
                    <button type="button" onclick="document.getElementById('chunk_interval').value='1 hour'" class="rounded-md border border-gray-300 bg-gray-50 px-2.5 py-1 text-xs font-medium text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">1 hour</button>
                    <button type="button" onclick="document.getElementById('chunk_interval').value='1 day'" class="rounded-md border border-gray-300 bg-gray-50 px-2.5 py-1 text-xs font-medium text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">1 day</button>
                    <button type="button" onclick="document.getElementById('chunk_interval').value='7 days'" class="rounded-md border border-orange-300 bg-orange-50 px-2.5 py-1 text-xs font-medium text-orange-700 hover:bg-orange-100 dark:border-orange-600 dark:bg-orange-900/30 dark:text-orange-300 dark:hover:bg-orange-900/50">7 days</button>
                    <button type="button" onclick="document.getElementById('chunk_interval').value='1 month'" class="rounded-md border border-gray-300 bg-gray-50 px-2.5 py-1 text-xs font-medium text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">1 month</button>
                    <button type="button" onclick="document.getElementById('chunk_interval').value='3 months'" class="rounded-md border border-gray-300 bg-gray-50 px-2.5 py-1 text-xs font-medium text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">3 months</button>
                </div>
                <input type="text" id="chunk_interval" name="chunk_interval" placeholder="7 days" value="7 days"
                       class="mt-2 block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100">
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">PostgreSQL interval format — or pick a preset above</p>
            </div>
            <div class="flex gap-3">
                <button type="submit" class="rounded-lg bg-orange-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-orange-500 transition-colors">Create Hypertable</button>
                <a href="/hypertables" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 shadow-sm hover:bg-gray-50 transition-colors dark:bg-gray-700 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-600">Cancel</a>
            </div>
        </form>
    </div>
</div>
{{end}}
