{{define "pages/query.html"}}
<div>
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">SQL Runner</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                Execute SQL queries
                {{if .Content.ReadOnly}}<span class="ml-2 inline-flex items-center rounded-full bg-amber-50 px-2 py-0.5 text-xs font-medium text-amber-700 dark:bg-amber-900/50 dark:text-amber-400">Read-Only Mode</span>{{end}}
                <span class="ml-2 text-xs text-gray-400 dark:text-gray-500">Row limit: {{.Content.RowLimit}}</span>
            </p>
        </div>
    </div>

    <div class="mt-6 rounded-lg border border-gray-200 bg-white p-6 dark:border-gray-700 dark:bg-gray-800">
        <form hx-post="/query/execute" hx-target="#query-results" hx-swap="innerHTML">
            <input type="hidden" name="gorilla.csrf.Token" value="{{.CSRFToken}}">
            <div>
                <textarea name="sql" rows="8" placeholder="SELECT * FROM ..."
                          class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border font-mono dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400"
                          spellcheck="false"></textarea>
            </div>
            <div class="mt-3 flex justify-between items-center">
                <button type="submit" class="inline-flex items-center rounded-lg bg-orange-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-orange-500 transition-colors">
                    <svg class="mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg>
                    Execute
                </button>
                <span class="text-xs text-gray-400 dark:text-gray-500">Ctrl+Enter to execute</span>
            </div>
        </form>
    </div>

    <div id="query-results" class="mt-6"></div>

    <script>
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            const form = document.querySelector('form[hx-post="/query/execute"]');
            if (form) htmx.trigger(form, 'submit');
        }
    });
    </script>
</div>
{{end}}
