{{define "pages/ca_create.html"}}
<div class="max-w-3xl">
    <div class="flex items-center gap-3 mb-6">
        <a href="/continuous-aggregates" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
        </a>
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Create Continuous Aggregate</h1>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Build a time-bucketed aggregate query step by step</p>
        </div>
    </div>

    <!-- Step 1: Pick Hypertable -->
    <div class="rounded-lg border border-gray-200 bg-white p-5 dark:border-gray-700 dark:bg-gray-800">
        <div class="flex items-center gap-2 mb-4">
            <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-orange-600 text-white text-xs font-bold">1</span>
            <h2 class="text-sm font-semibold text-gray-900 uppercase tracking-wide dark:text-gray-100">Select Hypertable</h2>
        </div>
        <select name="table_full" required
                class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500 text-sm px-3 py-2 border dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100"
                hx-get="/continuous-aggregates/builder/columns"
                hx-target="#builder-steps"
                hx-swap="innerHTML"
                hx-include="[name='table_full']">
            <option value="">Select a hypertable...</option>
            {{range .Content.Hypertables}}
            <option value="{{.Schema}}.{{.Name}}">{{.Schema}}.{{.Name}} ({{.TotalSize}}, {{.ChunkCount}} chunks)</option>
            {{end}}
        </select>
    </div>

    <div id="builder-steps" class="mt-4 space-y-4"></div>
</div>
{{end}}
